<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// CONFIG SUPABASE
// ============================================================
const SUPABASE_URL = "https://iietqmapaljtmuuewxwi.supabase.co";
const SUPABASE_KEY = "sb_publishable_ccrSFREsM3_5Pe3471fqxQ_d6L_VhS1";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LOCAL_KEY = "misiones-diarias:codigo-usuario";

// ============================================================
// HELPERS
// ============================================================
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

const yesterdayStr = () => {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

const monthStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};

const XP_PER_CHECK = 15;
const XP_PER_LEVEL = 150;
const COINS_POR_DIA_COMPLETO = 20;

function levelFromXp(xp) {
  const level = Math.floor(xp / XP_PER_LEVEL) + 1;
  const xpInLevel = xp % XP_PER_LEVEL;
  const pct = Math.min(100, Math.round((xpInLevel / XP_PER_LEVEL) * 100));
  return { level, xpInLevel, pct };
}

function generarCodigo(nombre) {
  const limpio = nombre.trim().replace(/\s+/g, "");
  const sufijo = Math.random().toString(36).substring(2, 5).toUpperCase();
  return `${limpio}-${sufijo}`;
}

// ============================================================
// CAPA DE DATOS (todas las llamadas a Supabase)
// ============================================================
const api = {
  async crearUsuario(nombre) {
    let codigo, intento = 0;
    while (intento < 5) {
      codigo = generarCodigo(nombre);
      const { data: existe } = await sb.from("usuarios").select("id").eq("codigo", codigo);
      if (!existe || existe.length === 0) break;
      intento++;
    }
    const { data, error } = await sb.from("usuarios").insert({ nombre: nombre.trim(), codigo }).select().single();
    if (error) throw error;
    await sb.from("coins_saldo").insert({ usuario_id: data.id, saldo: 0 });
    return data;
  },

  async buscarUsuarioPorCodigo(codigo) {
    const { data, error } = await sb.from("usuarios").select("*").eq("codigo", codigo.trim()).maybeSingle();
    if (error) throw error;
    return data;
  },

  async getAreasSugeridas() {
    const { data, error } = await sb.from("areas_sugeridas").select("*");
    if (error) throw error;
    return data || [];
  },

  async getMisiones(usuarioId) {
    const { data, error } = await sb.from("misiones").select("*").eq("usuario_id", usuarioId).eq("activa", true).order("creado_en");
    if (error) throw error;
    return data || [];
  },

  async crearMision(usuarioId, { nombre, icono, color, area_sugerida_id }) {
    const { data, error } = await sb.from("misiones").insert({
      usuario_id: usuarioId, nombre, icono, color, area_sugerida_id: area_sugerida_id || null,
    }).select().single();
    if (error) throw error;
    return data;
  },

  async desactivarMision(misionId) {
    const { error } = await sb.from("misiones").update({ activa: false }).eq("id", misionId);
    if (error) throw error;
  },

  async getProgresoHoy(usuarioId) {
    const { data, error } = await sb.from("progreso_diario").select("mision_id").eq("usuario_id", usuarioId).eq("fecha", todayStr());
    if (error) throw error;
    return (data || []).map((r) => r.mision_id);
  },

  async marcarMisionHecha(usuarioId, mision) {
    const { error: errProgreso } = await sb.from("progreso_diario").insert({
      usuario_id: usuarioId, fecha: todayStr(), mision_id: mision.id,
    });
    if (errProgreso) throw errProgreso;

    const wasYesterday = mision.ultimo_completado === yesterdayStr();
    const nuevaRacha = wasYesterday ? (mision.racha || 0) + 1 : 1;

    const { error: errMision } = await sb.from("misiones").update({
      xp: (mision.xp || 0) + XP_PER_CHECK,
      racha: nuevaRacha,
      ultimo_completado: todayStr(),
      total_completados: (mision.total_completados || 0) + 1,
    }).eq("id", mision.id);
    if (errMision) throw errMision;

    return nuevaRacha;
  },

  async otorgarCoinsPorDiaCompleto(usuarioId) {
    const { data: saldoRow } = await sb.from("coins_saldo").select("saldo").eq("usuario_id", usuarioId).maybeSingle();
    const saldoActual = saldoRow?.saldo || 0;
    await sb.from("coins_saldo").update({ saldo: saldoActual + COINS_POR_DIA_COMPLETO }).eq("usuario_id", usuarioId);
    await sb.from("coins_movimientos").insert({
      usuario_id: usuarioId, cantidad: COINS_POR_DIA_COMPLETO, motivo: `Día completo · ${todayStr()}`,
    });
  },

  async yaSeOtorgoCoinsHoy(usuarioId) {
    const { data } = await sb.from("coins_movimientos").select("id").eq("usuario_id", usuarioId).like("motivo", `%${todayStr()}%`);
    return (data || []).length > 0;
  },

  async getSaldoCoins(usuarioId) {
    const { data } = await sb.from("coins_saldo").select("saldo").eq("usuario_id", usuarioId).maybeSingle();
    return data?.saldo || 0;
  },

  async getRecompensas(usuarioId) {
    const { data, error } = await sb.from("recompensas").select("*").eq("usuario_id", usuarioId).eq("activa", true).order("costo_coins");
    if (error) throw error;
    return data || [];
  },

  async crearRecompensa(usuarioId, { nombre, costo_coins, icono }) {
    const { data, error } = await sb.from("recompensas").insert({
      usuario_id: usuarioId, nombre, costo_coins, icono: icono || "🎁",
    }).select().single();
    if (error) throw error;
    return data;
  },

  async eliminarRecompensa(recompensaId) {
    const { error } = await sb.from("recompensas").update({ activa: false }).eq("id", recompensaId);
    if (error) throw error;
  },

  async canjearRecompensa(usuarioId, recompensa, saldoActual) {
    if (saldoActual < recompensa.costo_coins) throw new Error("No tienes suficientes coins");
    await sb.from("coins_saldo").update({ saldo: saldoActual - recompensa.costo_coins }).eq("usuario_id", usuarioId);
    await sb.from("coins_movimientos").insert({
      usuario_id: usuarioId, cantidad: -recompensa.costo_coins, motivo: `Canje: ${recompensa.nombre}`,
    });
  },

  async getMetaAhorroMes(usuarioId) {
    const { data } = await sb.from("ahorro_metas").select("*").eq("usuario_id", usuarioId).eq("mes", monthStr()).maybeSingle();
    return data;
  },

  async setMetaAhorroMes(usuarioId, monto) {
    const { error } = await sb.from("ahorro_metas").upsert({
      usuario_id: usuarioId, mes: monthStr(), meta_monto: monto,
    }, { onConflict: "usuario_id,mes" });
    if (error) throw error;
  },

  async getAhorroDelMes(usuarioId) {
    const inicio = `${monthStr()}-01`;
    const { data, error } = await sb.from("ahorro_registros").select("*").eq("usuario_id", usuarioId).gte("fecha", inicio).order("fecha", { ascending: false });
    if (error) throw error;
    return data || [];
  },

  async registrarAhorro(usuarioId, monto) {
    const { error } = await sb.from("ahorro_registros").insert({
      usuario_id: usuarioId, fecha: todayStr(), monto,
    });
    if (error) throw error;
  },

  // -------- Solo para el panel de administrador --------
  async getResumenTodosLosUsuarios() {
    const { data: usuarios, error: errU } = await sb.from("usuarios").select("id, nombre, codigo, creado_en").order("creado_en");
    if (errU) throw errU;
    if (!usuarios || usuarios.length === 0) return [];

    const ids = usuarios.map((u) => u.id);

    const { data: misiones } = await sb.from("misiones").select("usuario_id, xp, racha").eq("activa", true).in("usuario_id", ids);
    const { data: saldos } = await sb.from("coins_saldo").select("usuario_id, saldo").in("usuario_id", ids);
    const { data: progresoHoy } = await sb.from("progreso_diario").select("usuario_id, mision_id").eq("fecha", todayStr()).in("usuario_id", ids);

    return usuarios.map((u) => {
      const misionesUsuario = (misiones || []).filter((m) => m.usuario_id === u.id);
      const xpTotal = misionesUsuario.reduce((s, m) => s + (m.xp || 0), 0);
      const { level } = levelFromXp(xpTotal);
      const bestStreak = misionesUsuario.length > 0 ? Math.max(0, ...misionesUsuario.map((m) => m.racha || 0)) : 0;
      const saldoRow = (saldos || []).find((s) => s.usuario_id === u.id);
      const hechasHoy = (progresoHoy || []).filter((p) => p.usuario_id === u.id).length;

      return {
        id: u.id,
        nombre: u.nombre,
        codigo: u.codigo,
        nivel: level,
        xpTotal,
        racha: bestStreak,
        coins: saldoRow?.saldo || 0,
        misionesHoy: hechasHoy,
        totalMisiones: misionesUsuario.length,
      };
    });
  },
};

// ============================================================
// PANTALLA: LOGIN
// ============================================================
function Login({ onLogin }) {
  const [modo, setModo] = useState("entrar"); // 'entrar' | 'crear'
  const [nombre, setNombre] = useState("");
  const [codigo, setCodigo] = useState("");
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState("");
  const [codigoCreado, setCodigoCreado] = useState(null);

  const handleCrear = async () => {
    if (!nombre.trim()) { setError("Escribe tu nombre"); return; }
    setError(""); setCargando(true);
    try {
      const usuario = await api.crearUsuario(nombre);
      localStorage.setItem(LOCAL_KEY, usuario.codigo);
      setCodigoCreado(usuario.codigo);
      setTimeout(() => onLogin(usuario), 2200);
    } catch (e) {
      setError("No se pudo crear tu cuenta. Intenta de nuevo.");
      console.error(e);
    } finally {
      setCargando(false);
    }
  };

  const handleEntrar = async () => {
    if (!codigo.trim()) { setError("Escribe tu código"); return; }
    setError(""); setCargando(true);
    try {
      const usuario = await api.buscarUsuarioPorCodigo(codigo);
      if (!usuario) { setError("No encontramos ese código. Revísalo bien."); return; }
      localStorage.setItem(LOCAL_KEY, usuario.codigo);
      onLogin(usuario);
    } catch (e) {
      setError("Hubo un problema al conectar. Intenta de nuevo.");
      console.error(e);
    } finally {
      setCargando(false);
    }
  };

  if (codigoCreado) {
    return (
      <div style={styles.loginWrap}>
        <div style={{ ...styles.loginCard, textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "#8A8D93", marginBottom: 8 }}>¡Cuenta creada!</div>
          <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 6 }}>Tu código personal es:</div>
          <div style={{
            fontFamily: "'Oswald', sans-serif", fontSize: 28, fontWeight: 700,
            color: "#E8472B", letterSpacing: 1, marginBottom: 10,
          }}>
            {codigoCreado}
          </div>
          <div style={{ fontSize: 11.5, color: "#5A5D63" }}>
            Lo guardamos en este dispositivo. Si entras desde otro celular, usa este código para acceder.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={styles.loginWrap}>
      <div style={styles.loginCard}>
        <div style={{
          fontFamily: "'Oswald', sans-serif", fontSize: 26, fontWeight: 700,
          textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6, textAlign: "center",
        }}>
          Misiones Diarias
        </div>
        <div style={{ fontSize: 12.5, color: "#8A8D93", textAlign: "center", marginBottom: 24 }}>
          Convierte tu vida en un juego
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 18, background: "#15171A", borderRadius: 10, padding: 4 }}>
          <button
            onClick={() => { setModo("entrar"); setError(""); }}
            style={{ ...styles.tabBtn, background: modo === "entrar" ? "#E8472B" : "transparent", color: modo === "entrar" ? "#0E0F11" : "#8A8D93" }}
          >
            Ya tengo cuenta
          </button>
          <button
            onClick={() => { setModo("crear"); setError(""); }}
            style={{ ...styles.tabBtn, background: modo === "crear" ? "#E8472B" : "transparent", color: modo === "crear" ? "#0E0F11" : "#8A8D93" }}
          >
            Soy nuevo
          </button>
        </div>

        {modo === "entrar" ? (
          <>
            <label style={styles.label}>Tu código personal</label>
            <input
              style={styles.input}
              placeholder="Ej: Carlos-4F2"
              value={codigo}
              onChange={(e) => setCodigo(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleEntrar()}
            />
            {error && <div style={styles.errorText}>{error}</div>}
            <button style={styles.primaryBtn} onClick={handleEntrar} disabled={cargando}>
              {cargando ? "Entrando…" : "Entrar"}
            </button>
          </>
        ) : (
          <>
            <label style={styles.label}>¿Cómo te llamas?</label>
            <input
              style={styles.input}
              placeholder="Ej: Carlos"
              value={nombre}
              onChange={(e) => setNombre(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleCrear()}
            />
            {error && <div style={styles.errorText}>{error}</div>}
            <button style={styles.primaryBtn} onClick={handleCrear} disabled={cargando}>
              {cargando ? "Creando…" : "Crear mi cuenta"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modalCard} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 600, textTransform: "uppercase" }}>
            {title}
          </div>
          <button onClick={onClose} style={styles.closeBtn}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ============================================================
// MODAL: Elegir / crear misiones
// ============================================================
function ModalMisiones({ usuario, areasSugeridas, misionesActuales, onClose, onMisionesActualizadas }) {
  const [creando, setCreando] = useState(false);
  const [nombreNueva, setNombreNueva] = useState("");
  const [iconoNueva, setIconoNueva] = useState("⭐");
  const [cargando, setCargando] = useState(false);

  const idsActivos = new Set(misionesActuales.map((m) => m.area_sugerida_id).filter(Boolean));

  const agregarDesdeSugerida = async (area) => {
    setCargando(true);
    try {
      await api.crearMision(usuario.id, { nombre: area.nombre, icono: area.icono, color: area.color, area_sugerida_id: area.id });
      await onMisionesActualizadas();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  const agregarPersonalizada = async () => {
    if (!nombreNueva.trim()) return;
    setCargando(true);
    try {
      const colores = ["#E8472B", "#3D7DE8", "#9B5DE5", "#3DDC97", "#E8B23D"];
      const colorRandom = colores[Math.floor(Math.random() * colores.length)];
      await api.crearMision(usuario.id, { nombre: nombreNueva, icono: iconoNueva || "⭐", color: colorRandom });
      setNombreNueva(""); setCreando(false);
      await onMisionesActualizadas();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  const quitarMision = async (mision) => {
    setCargando(true);
    try {
      await api.desactivarMision(mision.id);
      await onMisionesActualizadas();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  return (
    <Modal title="Tus misiones" onClose={onClose}>
      <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 12 }}>Misiones activas</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
        {misionesActuales.length === 0 && (
          <div style={{ fontSize: 12.5, color: "#5A5D63" }}>Aún no tienes misiones. Agrega algunas abajo.</div>
        )}
        {misionesActuales.map((m) => (
          <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "#15171A", borderRadius: 10, padding: "8px 10px" }}>
            <span style={{ fontSize: 18 }}>{m.icono}</span>
            <span style={{ flex: 1, fontSize: 13 }}>{m.nombre}</span>
            <button onClick={() => quitarMision(m)} style={styles.smallDangerBtn} disabled={cargando}>Quitar</button>
          </div>
        ))}
      </div>

      <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 10 }}>Agregar de la lista sugerida</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
        {areasSugeridas.filter((a) => !idsActivos.has(a.id)).map((area) => (
          <button key={area.id} onClick={() => agregarDesdeSugerida(area)} disabled={cargando} style={styles.areaPickBtn}>
            <div style={{ fontSize: 20 }}>{area.icono}</div>
            <div style={{ fontSize: 10.5, marginTop: 4 }}>{area.nombre}</div>
          </button>
        ))}
        {areasSugeridas.filter((a) => !idsActivos.has(a.id)).length === 0 && (
          <div style={{ fontSize: 12, color: "#5A5D63", gridColumn: "1 / -1" }}>Ya agregaste todas las sugeridas.</div>
        )}
      </div>

      <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 10 }}>O crea la tuya</div>
      {!creando ? (
        <button onClick={() => setCreando(true)} style={styles.secondaryBtn}>+ Misión personalizada</button>
      ) : (
        <div style={{ display: "flex", gap: 8 }}>
          <input style={{ ...styles.input, width: 56, textAlign: "center", flexShrink: 0 }} value={iconoNueva} onChange={(e) => setIconoNueva(e.target.value)} maxLength={2} />
          <input style={{ ...styles.input, flex: 1 }} placeholder="Nombre de la misión" value={nombreNueva} onChange={(e) => setNombreNueva(e.target.value)} onKeyDown={(e) => e.key === "Enter" && agregarPersonalizada()} />
          <button onClick={agregarPersonalizada} disabled={cargando} style={{ ...styles.primaryBtn, width: "auto", padding: "0 16px" }}>Listo</button>
        </div>
      )}
    </Modal>
  );
}

// MODAL: Tienda de recompensas
// ============================================================
function ModalTienda({ usuario, saldo, recompensas, onClose, onActualizar, setToast }) {
  const [creando, setCreando] = useState(false);
  const [nombre, setNombre] = useState("");
  const [costo, setCosto] = useState("");
  const [icono, setIcono] = useState("🎁");
  const [cargando, setCargando] = useState(false);

  const crear = async () => {
    if (!nombre.trim() || !costo || Number(costo) <= 0) return;
    setCargando(true);
    try {
      await api.crearRecompensa(usuario.id, { nombre, costo_coins: Number(costo), icono });
      setNombre(""); setCosto(""); setCreando(false);
      await onActualizar();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  const eliminar = async (r) => {
    setCargando(true);
    try {
      await api.eliminarRecompensa(r.id);
      await onActualizar();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  const canjear = async (r) => {
    if (saldo < r.costo_coins) { setToast("No tienes suficientes Coins"); setTimeout(() => setToast(null), 1800); return; }
    setCargando(true);
    try {
      await api.canjearRecompensa(usuario.id, r, saldo);
      setToast(`Canjeaste: ${r.nombre} 🎉`);
      setTimeout(() => setToast(null), 2000);
      await onActualizar();
    } catch (e) { console.error(e); }

// MODAL: Ahorro
// ============================================================
function ModalAhorro({ usuario, meta, registros, onClose, onActualizar }) {
  const [monto, setMonto] = useState("");
  const [metaInput, setMetaInput] = useState(meta?.meta_monto || "");
  const [cargando, setCargando] = useState(false);
  const [editandoMeta, setEditandoMeta] = useState(!meta);

  const totalMes = registros.reduce((sum, r) => sum + Number(r.monto), 0);
  const metaMonto = Number(meta?.meta_monto || 0);
  const pct = metaMonto > 0 ? Math.min(100, Math.round((totalMes / metaMonto) * 100)) : 0;

  const guardarMonto = async () => {
    if (!monto || Number(monto) <= 0) return;
    setCargando(true);
    try {
      await api.registrarAhorro(usuario.id, Number(monto));
      setMonto("");
      await onActualizar();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  const guardarMeta = async () => {
    if (!metaInput || Number(metaInput) <= 0) return;
    setCargando(true);
    try {
      await api.setMetaAhorroMes(usuario.id, Number(metaInput));
      setEditandoMeta(false);
      await onActualizar();
    } catch (e) { console.error(e); }
    setCargando(false);
  };

  return (
    <Modal title="Ahorro del mes" onClose={onClose}>
      {editandoMeta ? (
        <div style={{ marginBottom: 18 }}>
          <label style={styles.label}>¿Cuál es tu meta de ahorro este mes? (S/)</label>
          <div style={{ display: "flex", gap: 8 }}>
            <input style={{ ...styles.input, flex: 1 }} type="number" placeholder="Ej: 300" value={metaInput} onChange={(e) => setMetaInput(e.target.value)} />
            <button onClick={guardarMeta} disabled={cargando} style={{ ...styles.primaryBtn, width: "auto", padding: "0 16px" }}>Guardar</button>
          </div>
        </div>
      ) : (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#8A8D93", marginBottom: 6 }}>
            <span>Meta: S/ {metaMonto}</span>
            <button onClick={() => setEditandoMeta(true)} style={{ background: "none", border: "none", color: "#3D7DE8", fontSize: 11.5, cursor: "pointer" }}>Editar meta</button>
          </div>
          <div style={{ height: 10, borderRadius: 999, background: "#1E2124", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg, #3DDC97, #3D7DE8)", borderRadius: 999, transition: "width 0.5s ease" }} />
          </div>
          <div style={{ fontSize: 13, marginTop: 8, textAlign: "center" }}>
            <strong style={{ color: "#3DDC97" }}>S/ {totalMes.toFixed(2)}</strong> de S/ {metaMonto} ({pct}%)
          </div>
        </div>
      )}

      <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 8 }}>Registrar ahorro de hoy</div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <input style={{ ...styles.input, flex: 1 }} type="number" placeholder="Monto en S/" value={monto} onChange={(e) => setMonto(e.target.value)} onKeyDown={(e) => e.key === "Enter" && guardarMonto()} />
        <button onClick={guardarMonto} disabled={cargando} style={{ ...styles.primaryBtn, width: "auto", padding: "0 16px" }}>Agregar</button>
      </div>

      <div style={{ fontSize: 12, color: "#8A8D93", marginBottom: 10 }}>Historial del mes</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 180, overflowY: "auto" }}>
        {registros.length === 0 && <div style={{ fontSize: 12, color: "#5A5D63" }}>Sin registros este mes todavía.</div>}
        {registros.map((r) => (
          <div key={r.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, background: "#15171A", borderRadius: 8, padding: "6px 10px" }}>
            <span style={{ color: "#8A8D93" }}>{r.fecha}</span>
            <span style={{ color: "#3DDC97", fontWeight: 600 }}>+S/ {Number(r.monto).toFixed(2)}</span>
          </div>
        ))}
      </div>
    </Modal>
  );
}

// ---------- Ring ----------
function ProgressRing({ pct, color, size = 64, stroke = 6 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#2A2D31" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.5s ease" }} />
    </svg>
  );
}

function Dashboard({ usuario, onLogout }) {
  const [misiones, setMisiones] = useState([]);
  const [areasSugeridas, setAreasSugeridas] = useState([]);
  const [hechasHoyIds, setHechasHoyIds] = useState([]);
  const [saldo, setSaldo] = useState(0);
  const [recompensas, setRecompensas] = useState([]);
  const [metaAhorro, setMetaAhorro] = useState(null);
  const [registrosAhorro, setRegistrosAhorro] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [toast, setToast] = useState(null);
  const [modalAbierto, setModalAbierto] = useState(null); // 'misiones' | 'tienda' | 'ahorro'
  const [verPanelAdmin, setVerPanelAdmin] = useState(false);

  const cargarTodo = useCallback(async () => {
    const [mis, areas, hechas, sal, rec, meta, regs] = await Promise.all([
      api.getMisiones(usuario.id),
      api.getAreasSugeridas(),
      api.getProgresoHoy(usuario.id),
      api.getSaldoCoins(usuario.id),
      api.getRecompensas(usuario.id),
      api.getMetaAhorroMes(usuario.id),
      api.getAhorroDelMes(usuario.id),
    ]);
    setMisiones(mis);
    setAreasSugeridas(areas);
    setHechasHoyIds(hechas);
    setSaldo(sal);
    setRecompensas(rec);
    setMetaAhorro(meta);
    setRegistrosAhorro(regs);
    setCargando(false);
  }, [usuario.id]);

  useEffect(() => { cargarTodo(); }, [cargarTodo]);

  const handleCheck = async (mision) => {
    try {
      await api.marcarMisionHecha(usuario.id, mision);
      setToast(`+${XP_PER_CHECK} XP · ${mision.nombre}`);

      const nuevasHechas = [...hechasHoyIds, mision.id];
      setHechasHoyIds(nuevasHechas);

      if (misiones.length > 0 && nuevasHechas.length === misiones.length) {
        const yaOtorgado = await api.yaSeOtorgoCoinsHoy(usuario.id);
        if (!yaOtorgado) {
          await api.otorgarCoinsPorDiaCompleto(usuario.id);
          setTimeout(() => setToast(`🎉 ¡Día completo! +${COINS_POR_DIA_COMPLETO} Coins`), 600);
        }
      }
      setTimeout(() => setToast(null), 2200);
      await cargarTodo();
    } catch (e) {
      console.error(e);
      setToast("Hubo un error, intenta de nuevo");
      setTimeout(() => setToast(null), 1800);
    }

  if (cargando) {
    return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#8A8D93", fontSize: 14 }}>Cargando tu progreso…</div>;

  if (verPanelAdmin) {

          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 30, fontWeight: 700, color: "#E8472B", lineHeight: 1 }}>

            <div style={{ fontSize: 10.5, color: "#8A8D93", marginTop: 2 }}>misiones hoy</div>
          </div>
        </div>

        <div style={{ maxWidth: 720, margin: "14px auto 0" }}>
          <div style={{ height: 8, borderRadius: 999, background: "#1E2124", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg, #E8472B, #E8B23D)", borderRadius: 999, transition: "width 0.5s ease" }} />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
            {misiones.map((m) => (
              <MisionCard key={m.id} mision={m} hechaHoy={hechasHoyIds.includes(m.id)} onCheck={handleCheck} />
            ))}
          </div>
        )}
      </div>

      {/* Modales */}
      {modalAbierto === "misiones" && (
        <ModalMisiones usuario={usuario} areasSugeridas={areasSugeridas} misionesActuales={misiones} onClose={() => setModalAbierto(null)} onMisionesActualizadas={cargarTodo} />
      )}
      {modalAbierto === "tienda" && (
        <ModalTienda usuario={usuario} saldo={saldo} recompensas={recompensas} onClose={() => setModalAbierto(null)} onActualizar={cargarTodo} setToast={setToast} />
      )}
      {modalAbierto === "ahorro" && (
        <ModalAhorro usuario={usuario} meta={metaAhorro} registros={registrosAhorro} onClose={() => setModalAbierto(null)} onActualizar={cargarTodo} />
      )}

      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#17191C", border: "1px solid #E8472B", color: "#F2F0EB",
          padding: "10px 18px", borderRadius: 999, fontSize: 13, fontWeight: 600,
          fontFamily: "'Oswald', sans-serif", letterSpacing: 0.4,
          boxShadow: "0 6px 24px rgba(0,0,0,0.4)", zIndex: 80, textAlign: "center", maxWidth: "85%",
        }}>
          {toast}
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP RAÍZ
// ============================================================
function App() {
  const [usuario, setUsuario] = useState(null);
  const [verificando, setVerificando] = useState(true);

  useEffect(() => {
    (async () => {
      const codigoGuardado = localStorage.getItem(LOCAL_KEY);
      if (codigoGuardado) {
        try {
          const u = await api.buscarUsuarioPorCodigo(codigoGuardado);
          if (u) setUsuario(u);
        } catch (e) { console.error(e); }
      }
      setVerificando(false);
    })();
  }, []);

  const handleLogout = () => {
    localStorage.removeItem(LOCAL_KEY);
    setUsuario(null);
  };

  if (verificando) {
    return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#8A8D93", fontSize: 14 }}>Cargando…</div>;
  }

  if (!usuario) {
    return <Login onLogin={setUsuario} />;
  }

  return <Dashboard usuario={usuario} onLogout={handleLogout} />;
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);
</script>
